<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILO</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    max-width:900px;
    width:100%;
    text-align:center;
    padding:40px;
}

h1{
    font-size:3rem;
    font-weight:300;
    letter-spacing:.15em;
    margin-bottom:10px;
}

p{
    color:#ccc;
    margin-bottom:30px;
    line-height:1.6;
}

model-viewer{
    width:100%;
    height:65vh;
    background:#1a1a1a;
    border-radius:20px;
}

.button{
    display:inline-block;
    margin-top:25px;
    padding:16px 34px;
    border-radius:40px;
    background:white;
    color:black;
    text-decoration:none;
    font-weight:600;
    transition:.25s;
}

.button:hover{
    transform:scale(1.05);
}

footer{
    margin-top:25px;
    color:#888;
    font-size:.9rem;
}
</style>

</head>

<body>

<div class="container">

<h1>MILO</h1>

<p>
Explore the sculpture in augmented reality.<br>
Tap the button below and place it in your own space.
</p>

<model-viewer
src="MILO.glb"
ios-src="MILO.usdz"

camera-controls
auto-rotate

ar
ar-modes="webxr scene-viewer quick-look"

shadow-intensity="1.2"
environment-image="neutral"

exposure="1.1"

loading="eager"

>

<button slot="ar-button" class="button">
View in AR
</button>

</model-viewer>

<footer>
Move around your space to place the sculpture.
</footer>

</div>

</body>
</html>
